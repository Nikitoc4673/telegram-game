<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍪 Кликер-печенька (плавный)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(145deg, #2d1b0e 0%, #4a3724 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 20px;
            margin: 0;
        }

        .game-container {
            background: rgba(255, 243, 224, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 60px 60px 40px 40px;
            padding: 30px 25px;
            box-shadow: 0 30px 45px rgba(0,0,0,0.5), inset 0 2px 8px rgba(255,255,200,0.6);
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: 2px solid #d49b6a;
        }

        h1 {
            color: #4a2c1a;
            text-shadow: 2px 2px 0 #e7c68b;
            font-size: 2.2rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .score-panel {
            background: #5e3a22;
            border-radius: 100px;
            padding: 12px 25px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #ffd78b;
            font-weight: bold;
            font-size: 2rem;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.5), 0 8px 12px rgba(0,0,0,0.3);
            border: 2px solid #b7824a;
        }

        .cookie-icon {
            font-size: 2rem;
            filter: drop-shadow(0 4px 4px black);
        }

        #clicker-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 7rem;
            transition: transform 0.05s ease;
            filter: drop-shadow(0 18px 12px rgba(0,0,0,0.5));
            margin: 10px 0 5px;
            padding: 0;
            line-height: 1;
            display: inline-block;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            will-change: transform;
        }

        #clicker-btn:active {
            transform: scale(0.88);
        }

        .per-second {
            background: #dfcba4;
            border-radius: 30px;
            padding: 6px 18px;
            display: inline-block;
            margin: 5px 0 12px;
            font-weight: 600;
            color: #3b2b19;
            border: 1px solid #b59564;
            font-size: 1rem;
        }

        .upgrades-section {
            background: #f5e7d3;
            border-radius: 45px;
            padding: 15px 10px;
            margin-top: 12px;
            box-shadow: inset 0 2px 8px rgba(90, 50, 10, 0.5);
            border: 2px solid #c89f72;
        }

        .upgrade-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fef7e9;
            margin: 8px 0;
            padding: 10px 12px;
            border-radius: 40px;
            border: 2px solid #b5824a;
            box-shadow: 0 3px 5px rgba(0,0,0,0.2);
            flex-wrap: wrap;
            gap: 6px;
        }

        .upgrade-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-weight: bold;
            color: #3e2c18;
        }

        .upgrade-name {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .upgrade-effect {
            font-size: 0.75rem;
            color: #6b4f32;
            background: #ffe3b0;
            padding: 2px 10px;
            border-radius: 15px;
        }

        .buy-btn {
            background: linear-gradient(180deg, #ffc107 0%, #f08a2d 100%);
            border: none;
            border-radius: 35px;
            padding: 10px 16px;
            font-weight: bold;
            font-size: 0.95rem;
            color: #382813;
            border-bottom: 4px solid #b45f1a;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            will-change: transform;
        }

        .buy-btn:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
            background: #e07b1f;
        }

        .buy-btn:disabled {
            opacity: 0.5;
            filter: grayscale(0.5);
            border-bottom-width: 2px;
            transform: none;
            pointer-events: none;
            background: #b9a087;
            border-bottom-color: #6b5a4a;
        }

        .reset-btn {
            background: #e7c9a8;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            margin-top: 12px;
            font-weight: bold;
            color: #352415;
            border-bottom: 3px solid #745d46;
            cursor: pointer;
            transition: 0.1s;
        }

        .reset-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        /* Плавающий текст — теперь через requestAnimationFrame, легче */
        .float-text {
            position: fixed;
            pointer-events: none;
            font-weight: bold;
            color: #fbe555;
            text-shadow: 2px 2px 0 #5e3300;
            font-size: 1.8rem;
            z-index: 999;
            will-change: transform, opacity;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍪 ПЕЧЕНЬКО-КЛИКЕР</h1>
        
        <div class="score-panel">
            <span class="cookie-icon">🍪</span>
            <span id="cookie-count">0</span>
        </div>

        <button id="clicker-btn">🍪</button>

        <div class="per-second">
            ⏣ <span id="cookies-per-sec">0</span> печенек/сек
        </div>

        <div class="upgrades-section">
            <div class="upgrade-row">
                <div class="upgrade-info">
                    <span class="upgrade-name">🖱️ Курсор</span>
                    <span class="upgrade-effect">+1 печенька/клик</span>
                </div>
                <button class="buy-btn" id="buy-cursor-btn">💰 <span id="cursor-cost">15</span></button>
            </div>
            <div class="upgrade-row">
                <div class="upgrade-info">
                    <span class="upgrade-name">👵 Бабуля</span>
                    <span class="upgrade-effect">+1 печенька/сек</span>
                </div>
                <button class="buy-btn" id="buy-grandma-btn">💰 <span id="grandma-cost">100</span></button>
            </div>
            <div class="upgrade-row">
                <div class="upgrade-info">
                    <span class="upgrade-name">🌾 Ферма</span>
                    <span class="upgrade-effect">+5 печенек/сек</span>
                </div>
                <button class="buy-btn" id="buy-farm-btn">💰 <span id="farm-cost">500</span></button>
            </div>
        </div>

        <button class="reset-btn" id="reset-button">🔄 Сбросить прогресс</button>
        <div style="font-size:0.8rem; margin-top:6px; color:#6b4e2e;">Кликай по печеньке!</div>
    </div>

    <script>
        (function() {
            // Состояние
            const state = {
                cookies: 0,
                cursors: 0,
                grandmas: 0,
                farms: 0,
                baseCursorCost: 15,
                baseGrandmaCost: 100,
                baseFarmCost: 500,
                cookiesPerSecond: 0
            };

            // DOM элементы
            const cookieCountEl = document.getElementById('cookie-count');
            const cookiesPerSecEl = document.getElementById('cookies-per-sec');
            const clickerBtn = document.getElementById('clicker-btn');
            const buyCursorBtn = document.getElementById('buy-cursor-btn');
            const cursorCostEl = document.getElementById('cursor-cost');
            const buyGrandmaBtn = document.getElementById('buy-grandma-btn');
            const grandmaCostEl = document.getElementById('grandma-cost');
            const buyFarmBtn = document.getElementById('buy-farm-btn');
            const farmCostEl = document.getElementById('farm-cost');
            const resetBtn = document.getElementById('reset-button');

            // Кэшируем вычисления стоимости
            function getCursorCost() {
                return Math.floor(state.baseCursorCost * Math.pow(1.15, state.cursors));
            }
            function getGrandmaCost() {
                return Math.floor(state.baseGrandmaCost * Math.pow(1.15, state.grandmas));
            }
            function getFarmCost() {
                return Math.floor(state.baseFarmCost * Math.pow(1.15, state.farms));
            }

            function updatePerSecond() {
                state.cookiesPerSecond = state.grandmas * 1 + state.farms * 5;
                cookiesPerSecEl.textContent = state.cookiesPerSecond;
            }

            // Обновление UI (без пересоздания, только текст)
            function refreshUI() {
                cookieCountEl.textContent = Math.floor(state.cookies);
                
                const cCost = getCursorCost();
                cursorCostEl.textContent = cCost;
                buyCursorBtn.disabled = (state.cookies < cCost);
                
                const gCost = getGrandmaCost();
                grandmaCostEl.textContent = gCost;
                buyGrandmaBtn.disabled = (state.cookies < gCost);
                
                const fCost = getFarmCost();
                farmCostEl.textContent = fCost;
                buyFarmBtn.disabled = (state.cookies < fCost);
            }

            // Оптимизированная анимация: создаём элемент, анимируем через JS, а не CSS-анимацию
            function spawnFloatingText(x, y, text) {
                const el = document.createElement('div');
                el.className = 'float-text';
                el.textContent = text;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.style.opacity = '1';
                el.style.transform = 'translateY(0) scale(1)';
                document.body.appendChild(el);

                let start = null;
                const duration = 700; // мс

                function animate(timestamp) {
                    if (!start) start = timestamp;
                    const progress = timestamp - start;
                    const fraction = Math.min(progress / duration, 1);
                    
                    el.style.opacity = (1 - fraction).toString();
                    el.style.transform = `translateY(${-60 * fraction}px) scale(${1 + fraction * 0.4})`;
                    
                    if (fraction < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        el.remove();
                    }
                }
                
                requestAnimationFrame(animate);
            }

            function addCookies(amount, eventX, eventY) {
                if (amount <= 0) return;
                state.cookies += amount;
                if (eventX != null && eventY != null) {
                    spawnFloatingText(eventX, eventY, `+${Math.floor(amount)}`);
                }
                refreshUI();
            }

            // Обработчик клика (мышь и тач)
            function onCookieInteraction(e) {
                e.preventDefault();
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                const power = 1 + state.cursors; // базовая сила + курсоры
                addCookies(power, clientX, clientY);
            }

            clickerBtn.addEventListener('click', onCookieInteraction);
            clickerBtn.addEventListener('touchstart', onCookieInteraction, { passive: false });

            // Покупки
            function buyUpgrade(costFn, upgradeAction) {
                const cost = costFn();
                if (state.cookies >= cost) {
                    state.cookies -= cost;
                    upgradeAction();
                    refreshUI();
                }
            }

            buyCursorBtn.addEventListener('click', () => {
                buyUpgrade(getCursorCost, () => { state.cursors++; });
            });
            buyGrandmaBtn.addEventListener('click', () => {
                buyUpgrade(getGrandmaCost, () => {
                    state.grandmas++;
                    updatePerSecond();
                });
            });
            buyFarmBtn.addEventListener('click', () => {
                buyUpgrade(getFarmCost, () => {
                    state.farms++;
                    updatePerSecond();
                });
            });

            resetBtn.addEventListener('click', () => {
                if (confirm('Точно сбросить всё?')) {
                    state.cookies = 0;
                    state.cursors = 0;
                    state.grandmas = 0;
                    state.farms = 0;
                    updatePerSecond();
                    refreshUI();
                }
            });

            // Авто-доход раз в секунду (без анимации, чтобы не спамить)
            setInterval(() => {
                if (state.cookiesPerSecond > 0) {
                    state.cookies += state.cookiesPerSecond;
                    refreshUI();
                }
            }, 1000);

            // Стартовое обновление
            updatePerSecond();
            refreshUI();
        })();
    </script>
</body>
</html>
