<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚔️ РПГ: Подземелье теней</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0d0d0d;
            background-image: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 15px;
            margin: 0;
        }

        .game-container {
            background: linear-gradient(180deg, #1e1a16 0%, #14100c 100%);
            border: 3px solid #5a4a3a;
            border-radius: 30px;
            padding: 20px 18px;
            box-shadow: 0 0 40px rgba(200, 150, 50, 0.3), inset 0 0 30px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 460px;
            color: #d4c5a9;
            position: relative;
        }

        .title {
            text-align: center;
            font-size: 1.9rem;
            font-weight: bold;
            color: #f0c060;
            text-shadow: 0 0 15px #b87c1a, 2px 2px 0 #3a2a10;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #9b8c70;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        /* Панель персонажа */
        .hero-panel {
            background: #1c1610;
            border: 2px solid #5e4e38;
            border-radius: 20px;
            padding: 12px 15px;
            margin-bottom: 14px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .stat-icon {
            font-size: 1.3rem;
        }

        .stat-value {
            color: #f5d78c;
            font-weight: bold;
        }

        .hp-bar-bg {
            grid-column: span 2;
            height: 18px;
            background: #2a1a1a;
            border-radius: 20px;
            border: 1px solid #5a3a3a;
            overflow: hidden;
            margin-top: 2px;
        }

        .hp-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(180deg, #c0392b, #8b1a1a);
            border-radius: 20px;
            transition: width 0.25s ease;
            box-shadow: inset 0 2px 6px rgba(255,100,100,0.5);
        }

        .xp-bar-bg {
            grid-column: span 2;
            height: 12px;
            background: #1a1a2e;
            border-radius: 20px;
            border: 1px solid #3a3a5a;
            overflow: hidden;
        }

        .xp-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(180deg, #7d5fff, #4a2db5);
            border-radius: 20px;
            transition: width 0.25s ease;
        }

        /* Окно сообщений */
        .log-window {
            background: #0c0a07;
            border: 2px solid #3a3025;
            border-radius: 15px;
            padding: 12px;
            height: 130px;
            overflow-y: auto;
            margin-bottom: 14px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #c0b090;
            box-shadow: inset 0 0 25px black;
            scroll-behavior: smooth;
        }

        .log-entry {
            border-bottom: 1px dotted #3a3025;
            padding: 3px 0;
        }

        .log-entry.damage {
            color: #e05a5a;
        }
        .log-entry.heal {
            color: #6fcf6f;
        }
        .log-entry.gold {
            color: #f5c542;
        }
        .log-entry.levelup {
            color: #bb86fc;
            font-weight: bold;
            text-shadow: 0 0 8px #7c4dff;
        }

        /* Блок врага */
        .enemy-panel {
            background: #1c1414;
            border: 2px solid #6b3a3a;
            border-radius: 20px;
            padding: 12px 15px;
            margin-bottom: 14px;
            text-align: center;
            box-shadow: 0 0 20px rgba(180, 50, 50, 0.25);
            transition: opacity 0.3s;
        }

        .enemy-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #e07b7b;
            text-shadow: 0 0 10px #5a2020;
        }

        .enemy-hp-bar-bg {
            height: 14px;
            background: #2a1a1a;
            border-radius: 20px;
            border: 1px solid #5a3030;
            margin: 8px 0;
            overflow: hidden;
        }

        .enemy-hp-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(180deg, #d44a4a, #8b1a1a);
            border-radius: 20px;
            transition: width 0.2s ease;
        }

        .enemy-stats {
            font-size: 0.8rem;
            color: #b09080;
        }

        /* Кнопки действий */
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .action-btn {
            background: linear-gradient(180deg, #3a3530, #1f1b17);
            border: 2px solid #6b5d4a;
            color: #e0cfa0;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            font-weight: bold;
            padding: 12px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 5px 0 #0d0b08, 0 6px 12px black;
            letter-spacing: 1px;
            flex: 1 1 auto;
            min-width: 80px;
            text-shadow: 1px 1px 0 black;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0d0b08, 0 4px 8px black;
            background: #2a2520;
        }

        .action-btn:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: 0 2px 0 #0d0b08;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        .restart-btn {
            background: linear-gradient(180deg, #4a3030, #2a1515);
            border-color: #7a4a4a;
            margin-top: 5px;
            width: 100%;
            font-size: 0.9rem;
            padding: 10px;
        }

        .dead-message {
            color: #ff6b6b;
            font-weight: bold;
            text-align: center;
            margin: 8px 0;
            font-size: 1.2rem;
            text-shadow: 0 0 12px red;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">⚔️ ПОДЗЕМЕЛЬЕ ТЕНЕЙ</div>
        <div class="subtitle">Герой спускается во тьму...</div>

        <!-- Панель героя -->
        <div class="hero-panel">
            <div class="stat"><span class="stat-icon">❤️</span> HP: <span class="stat-value" id="hero-hp-text">100/100</span></div>
            <div class="stat"><span class="stat-icon">⚔️</span> Атака: <span class="stat-value" id="hero-atk">12</span></div>
            <div class="stat"><span class="stat-icon">🛡️</span> Защита: <span class="stat-value" id="hero-def">4</span></div>
            <div class="stat"><span class="stat-icon">💰</span> Золото: <span class="stat-value" id="hero-gold">0</span></div>
            <div class="hp-bar-bg"><div class="hp-bar-fill" id="hero-hp-bar"></div></div>
            <div style="grid-column: span 2; font-size:0.75rem; color:#9b8c70;">Уровень <span id="hero-lvl">1</span> | Опыт: <span id="hero-xp">0</span>/<span id="hero-xp-next">20</span></div>
            <div class="xp-bar-bg" style="grid-column: span 2;"><div class="xp-bar-fill" id="hero-xp-bar"></div></div>
        </div>

        <!-- Лог событий -->
        <div class="log-window" id="log-window">
            <div class="log-entry">Ты входишь в сырое подземелье...</div>
        </div>

        <!-- Враг -->
        <div class="enemy-panel" id="enemy-panel">
            <div class="enemy-name" id="enemy-name">🐀 Крыса</div>
            <div class="enemy-hp-bar-bg"><div class="enemy-hp-bar-fill" id="enemy-hp-bar"></div></div>
            <div class="enemy-stats">❤️ <span id="enemy-hp-text">18/18</span> | ⚔️ <span id="enemy-atk">5</span></div>
        </div>

        <!-- Кнопки -->
        <div class="actions">
            <button class="action-btn" id="btn-attack">⚔️ Атака</button>
            <button class="action-btn" id="btn-defend">🛡️ Защита</button>
            <button class="action-btn" id="btn-potion">🧪 Зелье</button>
        </div>
        <button class="action-btn restart-btn" id="btn-restart">💀 Начать заново</button>
        <div class="dead-message" id="dead-message" style="display:none;">💀 Вы пали в бою...</div>
    </div>

    <script>
        (function() {
            // ========== СОСТОЯНИЕ ГЕРОЯ ==========
            const hero = {
                maxHp: 100,
                hp: 100,
                baseAtk: 8,
                baseDef: 3,
                atk: 8,
                def: 3,
                gold: 0,
                level: 1,
                xp: 0,
                xpNext: 20,
                potions: 3,
                defending: false
            };

            // ========== ТЕКУЩИЙ ВРАГ ==========
            let enemy = null;

            // ========== DOM ЭЛЕМЕНТЫ ==========
            const heroHpText = document.getElementById('hero-hp-text');
            const heroAtkEl = document.getElementById('hero-atk');
            const heroDefEl = document.getElementById('hero-def');
            const heroGoldEl = document.getElementById('hero-gold');
            const heroHpBar = document.getElementById('hero-hp-bar');
            const heroLvlEl = document.getElementById('hero-lvl');
            const heroXpEl = document.getElementById('hero-xp');
            const heroXpNextEl = document.getElementById('hero-xp-next');
            const heroXpBar = document.getElementById('hero-xp-bar');

            const enemyNameEl = document.getElementById('enemy-name');
            const enemyHpText = document.getElementById('enemy-hp-text');
            const enemyAtkEl = document.getElementById('enemy-atk');
            const enemyHpBar = document.getElementById('enemy-hp-bar');

            const logWindow = document.getElementById('log-window');
            const deadMessage = document.getElementById('dead-message');

            const btnAttack = document.getElementById('btn-attack');
            const btnDefend = document.getElementById('btn-defend');
            const btnPotion = document.getElementById('btn-potion');
            const btnRestart = document.getElementById('btn-restart');

            // ========== ВРАГИ (пул) ==========
            const enemyPool = [
                { name: '🐀 Крыса', hp: 18, atk: 5, xpReward: 8, goldReward: 8 },
                { name: '🕷️ Паук', hp: 25, atk: 8, xpReward: 12, goldReward: 12 },
                { name: '💀 Скелет', hp: 40, atk: 11, xpReward: 18, goldReward: 18 },
                { name: '👹 Орк', hp: 55, atk: 15, xpReward: 25, goldReward: 25 },
                { name: '🐉 Дрейк', hp: 75, atk: 20, xpReward: 35, goldReward: 35 },
                { name: '👁️ Глаз-тиран', hp: 100, atk: 25, xpReward: 50, goldReward: 50 },
            ];

            // ========== ФУНКЦИИ ==========
            function randomEnemy() {
                // Чем выше уровень, тем сильнее враги (но не слишком)
                const maxIndex = Math.min(hero.level, enemyPool.length - 1);
                const minIndex = Math.max(0, maxIndex - 2);
                const idx = Math.floor(Math.random() * (maxIndex - minIndex + 1)) + minIndex;
                const template = enemyPool[idx];
                // Небольшой разброс характеристик
                const variation = 0.9 + Math.random() * 0.2;
                return {
                    name: template.name,
                    maxHp: Math.floor(template.hp * variation),
                    hp: Math.floor(template.hp * variation),
                    atk: Math.floor(template.atk * variation),
                    xpReward: template.xpReward,
                    goldReward: template.goldReward
                };
            }

            function spawnEnemy() {
                enemy = randomEnemy();
                updateEnemyUI();
            }

            function updateHeroUI() {
                heroHpText.textContent = `${hero.hp}/${hero.maxHp}`;
                heroAtkEl.textContent = hero.atk;
                heroDefEl.textContent = hero.def;
                heroGoldEl.textContent = hero.gold;
                heroHpBar.style.width = `${(hero.hp / hero.maxHp) * 100}%`;
                heroLvlEl.textContent = hero.level;
                heroXpEl.textContent = hero.xp;
                heroXpNextEl.textContent = hero.xpNext;
                heroXpBar.style.width = `${(hero.xp / hero.xpNext) * 100}%`;
                
                // Обновить кнопки
                const dead = hero.hp <= 0;
                btnAttack.disabled = dead;
                btnDefend.disabled = dead;
                btnPotion.disabled = dead || hero.potions <= 0;
                btnPotion.textContent = `🧪 Зелье (${hero.potions})`;
                
                if (dead) {
                    deadMessage.style.display = 'block';
                } else {
                    deadMessage.style.display = 'none';
                }
            }

            function updateEnemyUI() {
                if (!enemy) return;
                enemyNameEl.textContent = enemy.name;
                enemyHpText.textContent = `${enemy.hp}/${enemy.maxHp}`;
                enemyAtkEl.textContent = enemy.atk;
                enemyHpBar.style.width = `${(enemy.hp / enemy.maxHp) * 100}%`;
            }

            function addLog(message, cssClass = '') {
                const entry = document.createElement('div');
                entry.className = 'log-entry ' + (cssClass || '');
                entry.textContent = message;
                logWindow.appendChild(entry);
                logWindow.scrollTop = logWindow.scrollHeight;
                
                // Ограничим количество записей, чтобы не тормозило
                if (logWindow.children.length > 35) {
                    logWindow.removeChild(logWindow.firstChild);
                }
            }

            function gainXp(amount) {
                hero.xp += amount;
                addLog(`+${amount} опыта`, 'heal');
                while (hero.xp >= hero.xpNext) {
                    hero.xp -= hero.xpNext;
                    levelUp();
                }
            }

            function levelUp() {
                hero.level++;
                hero.xpNext = Math.floor(hero.xpNext * 1.5);
                hero.maxHp += 20;
                hero.hp = hero.maxHp; // полное исцеление при уровне
                hero.baseAtk += 3;
                hero.baseDef += 1;
                hero.atk = hero.baseAtk;
                hero.def = hero.baseDef;
                hero.potions = Math.min(hero.potions + 1, 5);
                addLog(`🎉 УРОВЕНЬ ${hero.level}! Характеристики повышены!`, 'levelup');
            }

            function heroAttack() {
                if (!enemy || hero.hp <= 0) return;
                // Сброс защиты после атаки
                hero.defending = false;
                hero.def = hero.baseDef;
                
                const damage = Math.max(1, hero.atk - Math.floor(enemy.atk * 0.2) + Math.floor(Math.random() * 5));
                enemy.hp -= damage;
                addLog(`Ты наносишь ${damage} урона ${enemy.name}.`, 'damage');
                
                if (enemy.hp <= 0) {
                    enemyDefeated();
                } else {
                    enemyTurn();
                }
                updateEnemyUI();
                updateHeroUI();
            }

            function heroDefend() {
                if (!enemy || hero.hp <= 0) return;
                hero.defending = true;
                hero.def = hero.baseDef + Math.floor(hero.baseDef * 1.2) + 2;
                addLog('Ты поднимаешь щит! Защита удвоена.', 'heal');
                enemyTurn();
                updateHeroUI();
            }

            function usePotion() {
                if (hero.potions <= 0 || hero.hp <= 0) return;
                hero.potions--;
                const healAmount = Math.floor(hero.maxHp * 0.4) + Math.floor(Math.random() * 15);
                const actualHeal = Math.min(healAmount, hero.maxHp - hero.hp);
                hero.hp += actualHeal;
                addLog(`Ты выпил зелье (+${actualHeal} HP).`, 'heal');
                
                // После зелья враг атакует
                if (enemy && enemy.hp > 0) {
                    enemyTurn();
                }
                updateHeroUI();
            }

            function enemyTurn() {
                if (!enemy || enemy.hp <= 0 || hero.hp <= 0) return;
                const rawDamage = enemy.atk - hero.def + Math.floor(Math.random() * 4);
                const damage = Math.max(1, rawDamage);
                hero.hp -= damage;
                addLog(`${enemy.name} атакует и наносит ${damage} урона.`, 'damage');
                
                if (hero.hp <= 0) {
                    hero.hp = 0;
                    addLog('💀 Ты пал в бою...', 'damage');
                }
                // Сброс защиты после вражеской атаки
                if (hero.defending) {
                    hero.def = hero.baseDef;
                    hero.defending = false;
                }
                updateHeroUI();
            }

            function enemyDefeated() {
                addLog(`✅ ${enemy.name} повержен!`, 'gold');
                hero.gold += enemy.goldReward;
                addLog(`💰 +${enemy.goldReward} золота`, 'gold');
                gainXp(enemy.xpReward);
                // Новый враг
                spawnEnemy();
                updateHeroUI();
                updateEnemyUI();
            }

            function restartGame() {
                hero.maxHp = 100;
                hero.hp = 100;
                hero.baseAtk = 8;
                hero.baseDef = 3;
                hero.atk = 8;
                hero.def = 3;
                hero.gold = 0;
                hero.level = 1;
                hero.xp = 0;
                hero.xpNext = 20;
                hero.potions = 3;
                hero.defending = false;
                
                logWindow.innerHTML = '<div class="log-entry">Новое приключение начинается...</div>';
                spawnEnemy();
                updateHeroUI();
                updateEnemyUI();
            }

            // ========== ПРИВЯЗКА СОБЫТИЙ ==========
            btnAttack.addEventListener('click', heroAttack);
            btnDefend.addEventListener('click', heroDefend);
            btnPotion.addEventListener('click', usePotion);
            btnRestart.addEventListener('click', restartGame);

            // ========== СТАРТ ==========
            spawnEnemy();
            updateHeroUI();
        })();
    </script>
</body>
</html>
