Вот HTML-код игры-кликера с накоплением очков, улучшениями и анимацией:

```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍪 Кликер-печенька</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(145deg, #2d1b0e 0%, #4a3724 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 20px;
            margin: 0;
        }

        .game-container {
            background: rgba(255, 243, 224, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 60px 60px 40px 40px;
            padding: 30px 25px;
            box-shadow: 0 30px 45px rgba(0,0,0,0.5), inset 0 2px 8px rgba(255,255,200,0.6);
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: 2px solid #d49b6a;
            transition: transform 0.2s;
        }

        h1 {
            color: #4a2c1a;
            text-shadow: 2px 2px 0 #e7c68b;
            font-size: 2.6rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .score-panel {
            background: #5e3a22;
            border-radius: 100px;
            padding: 15px 25px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #ffd78b;
            font-weight: bold;
            font-size: 2.2rem;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.5), 0 8px 12px rgba(0,0,0,0.3);
            border: 2px solid #b7824a;
        }

        .cookie-icon {
            font-size: 2.2rem;
            filter: drop-shadow(0 4px 4px black);
        }

        #clicker-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 8rem;
            transition: transform 0.07s ease;
            filter: drop-shadow(0 18px 12px rgba(0,0,0,0.5));
            margin: 15px 0 5px;
            padding: 0;
            line-height: 1;
            display: inline-block;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #clicker-btn:active {
            transform: scale(0.85);
            filter: drop-shadow(0 8px 8px rgba(0,0,0,0.6));
        }

        .per-second {
            background: #dfcba4;
            border-radius: 30px;
            padding: 8px 18px;
            display: inline-block;
            margin: 5px 0 15px;
            font-weight: 600;
            color: #3b2b19;
            border: 1px solid #b59564;
            font-size: 1.1rem;
            box-shadow: inset 0 1px 4px white;
        }

        .upgrades-section {
            background: #f5e7d3;
            border-radius: 45px;
            padding: 18px 12px;
            margin-top: 15px;
            box-shadow: inset 0 2px 8px rgba(90, 50, 10, 0.5);
            border: 2px solid #c89f72;
        }

        .upgrade-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fef7e9;
            margin: 10px 0;
            padding: 12px 15px;
            border-radius: 40px;
            border: 2px solid #b5824a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            flex-wrap: wrap;
            gap: 8px;
        }

        .upgrade-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-weight: bold;
            color: #3e2c18;
        }

        .upgrade-name {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .upgrade-effect {
            font-size: 0.8rem;
            color: #6b4f32;
            background: #ffe3b0;
            padding: 2px 10px;
            border-radius: 15px;
        }

        .buy-btn {
            background: #fdae5c;
            border: none;
            border-radius: 35px;
            padding: 12px 18px;
            font-weight: bold;
            font-size: 1rem;
            color: #382813;
            background: linear-gradient(180deg, #ffc107 0%, #f08a2d 100%);
            border-bottom: 4px solid #b45f1a;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .buy-btn:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
            background: #e07b1f;
        }

        .buy-btn:disabled {
            opacity: 0.5;
            filter: grayscale(0.6);
            border-bottom-width: 2px;
            transform: none;
            pointer-events: none;
            background: #b9a087;
            border-bottom-color: #6b5a4a;
        }

        .reset-btn {
            background: #c9a78b;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            margin-top: 12px;
            font-weight: bold;
            color: #352415;
            border-bottom: 3px solid #745d46;
            cursor: pointer;
            transition: 0.2s;
            background: #e7c9a8;
        }

        .reset-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .float-text {
            position: fixed;
            pointer-events: none;
            animation: floatUp 0.9s ease-out forwards;
            font-weight: bold;
            color: #fbe555;
            text-shadow: 2px 2px 0 #5e3300;
            font-size: 1.8rem;
            z-index: 999;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-70px) scale(1.4);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍪 ПЕЧЕНЬКО-КЛИКЕР</h1>
        
        <div class="score-panel">
            <span class="cookie-icon">🍪</span>
            <span id="cookie-count">0</span>
        </div>

        <button id="clicker-btn">🍪</button>

        <div class="per-second">
            ⏣ <span id="cookies-per-sec">0</span> печенек/сек
        </div>

        <div class="upgrades-section">
            <div class="upgrade-row" id="upgrade-cursor">
                <div class="upgrade-info">
                    <span class="upgrade-name">🖱️ Курсор</span>
                    <span class="upgrade-effect">+1 печенька/клик</span>
                </div>
                <button class="buy-btn" id="buy-cursor-btn">💰 <span id="cursor-cost">15</span></button>
            </div>
            <div class="upgrade-row" id="upgrade-grandma">
                <div class="upgrade-info">
                    <span class="upgrade-name">👵 Бабуля</span>
                    <span class="upgrade-effect">+1 печенька/сек</span>
                </div>
                <button class="buy-btn" id="buy-grandma-btn">💰 <span id="grandma-cost">100</span></button>
            </div>
            <div class="upgrade-row" id="upgrade-farm">
                <div class="upgrade-info">
                    <span class="upgrade-name">🌾 Ферма</span>
                    <span class="upgrade-effect">+5 печенек/сек</span>
                </div>
                <button class="buy-btn" id="buy-farm-btn">💰 <span id="farm-cost">500</span></button>
            </div>
        </div>

        <button class="reset-btn" id="reset-button">🔄 Сбросить прогресс</button>
        <div style="font-size:0.8rem; margin-top:8px; color:#6b4e2e;">Кликай по печеньке!</div>
    </div>

    <script>
        (function() {
            // ---------- СОСТОЯНИЕ ИГРЫ ----------
            const state = {
                cookies: 0,
                clickPower: 1,        // базовый клик = 1 печенька
                cookiesPerSecond: 0,
                // Уровни улучшений
                cursors: 0,
                grandmas: 0,
                farms: 0,
                // Базовые стоимости
                baseCursorCost: 15,
                baseGrandmaCost: 100,
                baseFarmCost: 500
            };

            // DOM элементы
            const cookieCountEl = document.getElementById('cookie-count');
            const cookiesPerSecEl = document.getElementById('cookies-per-sec');
            const clickerBtn = document.getElementById('clicker-btn');
            
            const buyCursorBtn = document.getElementById('buy-cursor-btn');
            const cursorCostEl = document.getElementById('cursor-cost');
            
            const buyGrandmaBtn = document.getElementById('buy-grandma-btn');
            const grandmaCostEl = document.getElementById('grandma-cost');
            
            const buyFarmBtn = document.getElementById('buy-farm-btn');
            const farmCostEl = document.getElementById('farm-cost');
            
            const resetBtn = document.getElementById('reset-button');

            // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
            function calculateCursorCost() {
                return Math.floor(state.baseCursorCost * Math.pow(1.15, state.cursors));
            }

            function calculateGrandmaCost() {
                return Math.floor(state.baseGrandmaCost * Math.pow(1.15, state.grandmas));
            }

            function calculateFarmCost() {
                return Math.floor(state.baseFarmCost * Math.pow(1.15, state.farms));
            }

            // Обновить cookiesPerSecond на основе зданий
            function updateCookiesPerSecond() {
                state.cookiesPerSecond = state.grandmas * 1 + state.farms * 5;
                cookiesPerSecEl.textContent = state.cookiesPerSecond;
            }

            // Полное обновление интерфейса (кнопки, текст)
            function refreshUI() {
                cookieCountEl.textContent = Math.floor(state.cookies);
                cookiesPerSecEl.textContent = state.cookiesPerSecond;
                
                const cursorCost = calculateCursorCost();
                cursorCostEl.textContent = cursorCost;
                buyCursorBtn.disabled = (state.cookies < cursorCost);
                
                const grandmaCost = calculateGrandmaCost();
                grandmaCostEl.textContent = grandmaCost;
                buyGrandmaBtn.disabled = (state.cookies < grandmaCost);
                
                const farmCost = calculateFarmCost();
                farmCostEl.textContent = farmCost;
                buyFarmBtn.disabled = (state.cookies < farmCost);
            }

            // Добавление печенек (с анимацией)
            function addCookies(amount, eventX = null, eventY = null) {
                if (amount <= 0) return;
                state.cookies += amount;
                
                // Создаём плавающий текст, если переданы координаты
                if (eventX !== null && eventY !== null && amount >= 1) {
                    createFloatingText(eventX, eventY, `+${Math.floor(amount)}`);
                }
                
                refreshUI();
            }

            // Анимация "+число"
            function createFloatingText(x, y, text) {
                const floatEl = document.createElement('div');
                floatEl.className = 'float-text';
                floatEl.textContent = text;
                floatEl.style.left = `${x}px`;
                floatEl.style.top = `${y}px`;
                document.body.appendChild(floatEl);
                
                floatEl.addEventListener('animationend', () => {
                    floatEl.remove();
                });
            }

            // Покупка улучшения (универсальная логика)
            function purchaseUpgrade(cost, onSuccess) {
                if (state.cookies >= cost) {
                    state.cookies -= cost;
                    onSuccess();
                    refreshUI();
                    return true;
                }
                return false;
            }

            // ---------- ДЕЙСТВИЯ ИГРОКА ----------
            function handleCookieClick(event) {
                // Определяем координаты для анимации
                let clientX, clientY;
                if (event.touches) {
                    // Мобильное касание
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                } else {
                    clientX = event.clientX;
                    clientY = event.clientY;
                }
                
                const power = state.clickPower + state.cursors; // каждый курсор +1 к клику
                addCookies(power, clientX, clientY);
            }

            function buyCursor() {
                const cost = calculateCursorCost();
                purchaseUpgrade(cost, () => {
                    state.cursors++;
                    // клик-сила увеличивается за счёт курсоров (учтено в handleCookieClick)
                });
            }

            function buyGrandma() {
                const cost = calculateGrandmaCost();
                purchaseUpgrade(cost, () => {
                    state.grandmas++;
                    updateCookiesPerSecond();
                });
            }

            function buyFarm() {
                const cost = calculateFarmCost();
                purchaseUpgrade(cost, () => {
                    state.farms++;
                    updateCookiesPerSecond();
                });
            }

            function resetGame() {
                if (confirm('Точно сбросить всё? Прогресс будет потерян.')) {
                    state.cookies = 0;
                    state.cursors = 0;
                    state.grandmas = 0;
                    state.farms = 0;
                    state.clickPower = 1;
                    updateCookiesPerSecond();
                    refreshUI();
                }
            }

            // ---------- АВТОМАТИЧЕСКОЕ ПРОИЗВОДСТВО (каждую секунду) ----------
            function gameLoop() {
                if (state.cookiesPerSecond > 0) {
                    // Добавляем печеньки без анимации (или с анимацией от центра? без координат)
                    addCookies(state.cookiesPerSecond, null, null);
                }
            }

            // ---------- ПРИВЯЗКА СОБЫТИЙ ----------
            clickerBtn.addEventListener('click', handleCookieClick);
            clickerBtn.addEventListener('touchstart', (e) => {
                e.preventDefault(); // чтобы не было двойного срабатывания на мобильных
                handleCookieClick(e);
            }, {passive: false});
            
            buyCursorBtn.addEventListener('click', buyCursor);
            buyGrandmaBtn.addEventListener('click', buyGrandma);
            buyFarmBtn.addEventListener('click', buyFarm);
            resetBtn.addEventListener('click', resetGame);

            // Инициализация интерфейса
            updateCookiesPerSecond();
            refreshUI();

            // Запуск игрового цикла (каждые 1000 мс)
            setInterval(gameLoop, 1000);

            // Дополнительно: сохранять прогресс? (для простоты без сохранения, но можно добавить)
            console.log('🍪 Кликер готов! Жми на печеньку.');
        })();
    </script>
</body>
</html>
